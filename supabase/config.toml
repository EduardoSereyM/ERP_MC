# Supabase local config — generado con: supabase init
# Actualizar project_id con el ID real del proyecto en Supabase Cloud

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
# Buckets definidos en mc_v3:
# cotizaciones-pdf, fotos-ot, fotos-st, fotos-incidencias, firmas, evidencia-reclamos, documentos-nc

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false   # Solo admin crea usuarios — signup público deshabilitado

[auth.email]
enable_signup = false
enable_confirmations = false
